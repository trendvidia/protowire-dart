# See https://dart.dev/guides/language/analysis-options
include: package:lints/recommended.yaml

analyzer:
  exclude:
    # Generated proto code: keep the analyzer quiet on it. Style nits in
    # auto-generated files would just churn the output of `buf generate`.
    - lib/src/generated/**
  errors:
    # Promote noise-level findings to errors so the build catches them.
    unused_import: error
    unused_local_variable: error
    unused_element: error
    dead_code: error
    # Keep the lowerCamelCase reminder informational — the existing private
    # SCREAMING_SNAKE constants in the SBE codec mirror the proto field-bit
    # encoding and are easier to read that way.
    constant_identifier_names: ignore
    # The bit-twiddling SBE codec deliberately uses `dynamic`-typed
    # GeneratedMessage.getField/setField. Tightening to strict-casts is
    # tracked as a future cleanup, not a PR1 blocker.

linter:
  rules:
    - avoid_dynamic_calls
    - avoid_print
    - avoid_returning_null_for_void
    - prefer_const_constructors
    - prefer_final_locals
    - sort_pub_dependencies
